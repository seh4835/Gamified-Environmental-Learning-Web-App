<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <title>EcoLearn AR Scanner</title>
    <script src="https://aframe.io/releases/1.4.2/aframe.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/ar.js@3.4.5/aframe/aframe-ar.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        html, body {
            width: 100%;
            height: 100%;
            overflow: hidden;
            background: #000;
        }
        a-scene {
            position: fixed !important;
            top: 0 !important;
            left: 0 !important;
            width: 100% !important;
            height: 100% !important;
            z-index: 0 !important;
        }
        #container {
            width: 100%;
            height: 100%;
            position: relative;
            overflow: hidden;
        }
        #info {
            position: fixed;
            top: 20px;
            left: 20px;
            color: white;
            background: rgba(0, 0, 0, 0.7);
            padding: 15px;
            border-radius: 8px;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
            z-index: 100;
            max-width: 300px;
            font-size: 14px;
        }
        #info h3 {
            margin-bottom: 8px;
            font-size: 18px;
        }
        #info p {
            margin: 5px 0;
            font-size: 13px;
        }
        .status {
            font-size: 12px;
            margin-top: 8px;
            padding-top: 8px;
            border-top: 1px solid rgba(255,255,255,0.3);
        }
        .status.loading { color: #ffc107; }
        .status.error { color: #ff5252; }
        .status.success { color: #4caf50; }
        
        #close-btn {
            position: fixed;
            top: 20px;
            right: 20px;
            padding: 12px 20px;
            background: linear-gradient(135deg, #ff6b6b, #ff5252);
            color: white;
            border: none;
            border-radius: 25px;
            cursor: pointer;
            font-size: 14px;
            font-weight: 600;
            z-index: 100;
            box-shadow: 0 4px 8px rgba(0,0,0,0.3);
            transition: transform 0.2s, box-shadow 0.2s;
        }
        #close-btn:hover {
            transform: scale(1.05);
            box-shadow: 0 6px 12px rgba(0,0,0,0.4);
        }
        #close-btn:active {
            transform: scale(0.95);
        }
        
        #permission-prompt {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.9);
            z-index: 200;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            color: white;
            text-align: center;
        }
        #permission-prompt.show {
            display: flex;
        }
        #permission-prompt h2 {
            font-size: 24px;
            margin-bottom: 20px;
        }
        #permission-prompt p {
            font-size: 16px;
            margin-bottom: 30px;
            max-width: 400px;
            line-height: 1.5;
        }
        .btn-group {
            display: flex;
            gap: 10px;
        }
        .btn-group button {
            padding: 12px 24px;
            border: none;
            border-radius: 25px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: transform 0.2s;
        }
        .btn-group button:hover {
            transform: scale(1.05);
        }
        .btn-group button.primary {
            background: #4caf50;
            color: white;
        }
        .btn-group button.secondary {
            background: #666;
            color: white;
        }
    </style>
</head>
<body>
    <div id="container">
        <div id="info">
            <h3>EcoLearn AR Scanner</h3>
            <p>Point your camera at AR markers to scan</p>
            <div class="status loading" id="status">🔄 Initializing...</div>
        </div>
        <button id="close-btn" onclick="goBack()">Back</button>
        
        <div id="permission-prompt">
            <h2>Camera Permission Required</h2>
            <p>This AR Scanner needs access to your camera to work. Please allow camera access.</p>
            <div class="btn-group">
                <button class="primary" onclick="requestCameraPermission()">Allow Camera</button>
                <button class="secondary" onclick="goBack()">Cancel</button>
            </div>
        </div>

        <a-scene 
            id="arScene"
            embedded 
            arjs="sourceType: webcam; debugUIEnabled: false; detectionMode: mono_and_matrix; matrixCodeType: 3x3; cameraParametersUrl: 'https://cdn.jsdelivr.net/npm/ar.js@3/aframe/data/camera_para.dat';"
            vr-mode-ui="enabled: false"
            gesture-detector
        >
            <a-camera position="0 0 0"></a-camera>
            
            <!-- Hiro Marker -->
            <a-marker preset="hiro" id="hiro-marker" emitevents="true">
                <a-box position="0 0 0" scale="1 1 1" color="#FF6B6B" rotation="0 45 0">
                    <a-animation attribute="rotation" to="360 405 0" dur="2000" repeat="indefinite"></a-animation>
                </a-box>
                <a-text value="Hiro Marker Detected!" position="0 1.5 0" align="center" scale="0.7 0.7 0.7" color="white"></a-text>
            </a-marker>
            
            <!-- Kanji Marker -->
            <a-marker preset="kanji" id="kanji-marker" emitevents="true">
                <a-cylinder position="0 0.5 0" radius="0.5" height="1" color="#4CAF50">
                    <a-animation attribute="rotation" to="0 360 0" dur="3000" repeat="indefinite"></a-animation>
                </a-cylinder>
                <a-text value="Kanji Marker Detected!" position="0 1.8 0" align="center" scale="0.7 0.7 0.7" color="white"></a-text>
            </a-marker>
            
            <!-- Barcode Marker (0-8) -->
            <a-marker type="barcode" value="0" id="barcode-marker" emitevents="true">
                <a-sphere position="0 0.5 0" radius="0.5" color="#2196F3">
                    <a-animation attribute="scale" to="1.2 1.2 1.2" dur="1000" repeat="indefinite" direction="alternate"></a-animation>
                </a-sphere>
                <a-text value="Barcode Detected!" position="0 1.8 0" align="center" scale="0.7 0.7 0.7" color="white"></a-text>
            </a-marker>
        </a-scene>
    </div>

    <script>
        const infoDiv = document.getElementById('info');
        const statusDiv = document.getElementById('status');
        const permissionPrompt = document.getElementById('permission-prompt');
        const arScene = document.getElementById('arScene');
        let cameraInitialized = false;
        
        // Initialize AR - Let AR.js handle the camera
        function initAR() {
            try {
                updateStatus('🔄 Initializing AR...', 'loading');
                
                // Check if getUserMedia is available
                if (!navigator.mediaDevices || !navigator.mediaDevices.getUserMedia) {
                    updateStatus('❌ Camera not supported on this device', 'error');
                    return;
                }

                // AR.js will request camera when the scene loads
                // Just set up event listeners
                setupMarkerListeners();
                
            } catch (err) {
                console.error('AR initialization error:', err);
                updateStatus('❌ Error initializing AR', 'error');
            }
        }

        function setupMarkerListeners() {
            const markers = ['hiro-marker', 'kanji-marker', 'barcode-marker'];
            
            markers.forEach(markerId => {
                const marker = document.getElementById(markerId);
                if (marker) {
                    marker.addEventListener('markerFound', function() {
                        console.log('Marker found:', markerId);
                        updateStatus('✅ Marker detected! Hold position...', 'success');
                    });
                    
                    marker.addEventListener('markerLost', function() {
                        console.log('Marker lost:', markerId);
                        updateStatus('✅ Ready to scan! Point at a marker', 'success');
                    });
                }
            });
        }

        function requestCameraPermission() {
            // Try to request camera directly
            navigator.mediaDevices.getUserMedia({ 
                video: { facingMode: 'environment' },
                audio: false 
            }).then(stream => {
                // Success - stop the stream and let AR.js take over
                stream.getTracks().forEach(track => track.stop());
                permissionPrompt.classList.remove('show');
                updateStatus('✅ Ready to scan! Point at a marker', 'success');
                cameraInitialized = true;
            }).catch(err => {
                console.error('Camera permission error:', err);
                updateStatus('❌ Camera access denied', 'error');
                permissionPrompt.classList.add('show');
            });
        }

        function updateStatus(message, className) {
            statusDiv.textContent = message;
            statusDiv.className = 'status ' + className;
        }

        function goBack() {
            if (window.history.length > 1) {
                window.history.back();
            } else {
                window.location.href = '/';
            }
        }

        // Watch for A-Frame scene loaded
        document.addEventListener('arjs-session-started', function() {
            console.log('AR session started');
            updateStatus('✅ Camera ready! Point at a marker', 'success');
            cameraInitialized = true;
        });

        // Handle scene loaded
        arScene.addEventListener('loaded', function() {
            console.log('A-Frame scene loaded');
            setTimeout(() => {
                if (!cameraInitialized) {
                    updateStatus('✅ Ready to scan! Point at a marker', 'success');
                    cameraInitialized = true;
                }
            }, 1000);
        });

        // Start initialization on page load
        window.addEventListener('load', function() {
            console.log('Page loaded, initializing AR...');
            setTimeout(initAR, 300);
        });

        // Fallback if page already loaded
        if (document.readyState === 'complete' || document.readyState === 'interactive') {
            console.log('Document already ready, initializing AR...');
            setTimeout(initAR, 300);
        }

        // Monitor camera stream status
        setTimeout(() => {
            const video = document.querySelector('video');
            if (video) {
                console.log('Video element found:', video);
                video.addEventListener('loadedmetadata', () => {
                    console.log('Video stream active:', video.videoWidth, 'x', video.videoHeight);
                    updateStatus('✅ Camera active! Point at a marker', 'success');
                });
            }
        }, 2000);
    </script>
</body>
</html>
