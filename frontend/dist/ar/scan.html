<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <title>EcoLearn AR Scanner</title>

    <!-- Load scripts statically with correct CDN URLs -->
    <script src="https://aframe.io/releases/1.4.2/aframe.min.js"></script>
    <script src="https://raw.githack.com/AR-js-org/AR.js/3.4.5/aframe/build/aframe-ar.js"></script>

    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        html, body {
            width: 100%; height: 100%;
            overflow: hidden;
            background: #000;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
        }

        /* AR.js renders the camera feed TO the canvas — keep it full-screen */
        a-scene {
            position: fixed !important;
            inset: 0 !important;
            width: 100% !important;
            height: 100% !important;
            z-index: 0 !important;
        }

        /* ── HUD ───────────────────────────────────────────── */
        #hud {
            position: fixed;
            inset: 0;
            pointer-events: none;
            z-index: 10;
        }

        #info-box {
            position: absolute;
            top: 20px; left: 20px;
            background: rgba(0,0,0,0.72);
            border: 1px solid rgba(255,255,255,0.12);
            backdrop-filter: blur(10px);
            color: #fff;
            padding: 14px 18px;
            border-radius: 16px;
            max-width: 280px;
        }
        #info-box h3 {
            font-size: 17px; font-weight: 700; margin-bottom: 4px;
        }
        #info-box p { font-size: 13px; color: #ccc; }
        #status {
            margin-top: 10px; font-size: 13px; font-weight: 600;
            padding: 6px 10px; border-radius: 8px;
        }
        .st-loading { background: rgba(255,193,7,0.18); color: #ffc107; }
        .st-success { background: rgba(76,175,80,0.18);  color: #4caf50; }
        .st-error   { background: rgba(244,67,54,0.18);  color: #f44336; }

        /* Viewfinder */
        #viewfinder {
            position: absolute;
            inset: 0;
            display: flex; align-items: center; justify-content: center;
        }
        .frame {
            width: min(60vw, 250px);
            height: min(60vw, 250px);
            position: relative;
        }
        .corner {
            position: absolute;
            width: 30px; height: 30px;
            border-color: #4caf50; border-style: solid; border-width: 0;
        }
        .tl { top:0; left:0;  border-top-width:3px;    border-left-width:3px;  border-top-left-radius:4px; }
        .tr { top:0; right:0; border-top-width:3px;    border-right-width:3px; border-top-right-radius:4px; }
        .bl { bottom:0; left:0;  border-bottom-width:3px; border-left-width:3px;  border-bottom-left-radius:4px; }
        .br { bottom:0; right:0; border-bottom-width:3px; border-right-width:3px; border-bottom-right-radius:4px; }
        .scan-line {
            position: absolute; left:0; right:0; height:2px;
            background: linear-gradient(90deg, transparent, #4caf50, transparent);
            animation: scan 2.4s ease-in-out infinite;
        }
        @keyframes scan { 0%{top:0} 50%{top:100%} 100%{top:0} }

        /* Back button */
        #back-btn {
            position: absolute;
            top: 20px; right: 20px;
            pointer-events: all;
            padding: 10px 22px;
            background: rgba(255,255,255,0.12);
            border: 1px solid rgba(255,255,255,0.22);
            backdrop-filter: blur(10px);
            color: #fff; border-radius: 25px;
            font-size: 14px; font-weight: 600; cursor: pointer;
            transition: background 0.2s, transform 0.15s;
        }
        #back-btn:hover  { background: rgba(255,255,255,0.22); transform: scale(1.04); }
        #back-btn:active { transform: scale(0.96); }

        /* ── Full-screen overlay (permission / error) ─────── */
        #overlay {
            display: none; position: fixed; inset: 0;
            background: rgba(10,20,10,0.96);
            z-index: 200;
            flex-direction: column; align-items: center; justify-content: center;
            color: #fff; text-align: center; padding: 36px;
        }
        #overlay.show { display: flex; }
        #overlay .ov-icon { font-size: 70px; margin-bottom: 24px; }
        #overlay h2 { font-size: 22px; font-weight: 700; margin-bottom: 12px; }
        #overlay p  { font-size: 15px; color: #bbb; line-height: 1.65; max-width: 360px; margin-bottom: 30px; }
        .btn-row { display: flex; gap: 12px; flex-wrap: wrap; justify-content: center; }
        .btn {
            padding: 13px 30px; border: none; border-radius: 25px;
            font-size: 15px; font-weight: 700; cursor: pointer;
            transition: transform 0.15s, opacity 0.15s;
        }
        .btn:hover { opacity: 0.88; transform: scale(1.04); }
        .btn-green { background: linear-gradient(135deg,#43a047,#66bb6a); color:#fff; }
        .btn-gray  { background: rgba(255,255,255,0.12); color:#fff; border:1px solid rgba(255,255,255,0.2); }

        /* Marker popup toast */
        #marker-toast {
            display: none;
            position: absolute;
            bottom: 48px; left: 50%; transform: translateX(-50%);
            background: linear-gradient(135deg,#1b5e20,#2e7d32);
            color: #fff; border-radius: 16px;
            padding: 16px 28px; text-align: center;
            box-shadow: 0 8px 24px rgba(0,0,0,0.5);
            min-width: 240px; font-size: 15px;
        }
        #marker-toast.show { display: block; }
        #marker-toast strong { display: block; font-size: 18px; margin-bottom: 4px; }
    </style>
</head>
<body>

<!-- The a-scene IS the camera feed — AR.js renders video to its WebGL canvas -->
<a-scene
    id="ar-scene"
    embedded
    arjs="sourceType: webcam; debugUIEnabled: false; detectionMode: mono_and_matrix; matrixCodeType: 3x3;"
    vr-mode-ui="enabled: false"
    renderer="antialias: true; alpha: false; logarithmicDepthBuffer: true;"
    style="display:none;"
>
    <a-camera position="0 0 0"></a-camera>

    <!-- Hiro marker -->
    <a-marker id="m-hiro" preset="hiro" emitevents="true">
        <a-box position="0 0.5 0" scale="0.8 0.8 0.8" color="#FF6B6B">
            <a-animation attribute="rotation" to="0 360 0" dur="2000" repeat="indefinite"></a-animation>
        </a-box>
        <a-text value="Climate Change Module" position="0 1.5 0" align="center" scale="0.6 0.6 0.6" color="#fff"></a-text>
    </a-marker>

    <!-- Kanji marker -->
    <a-marker id="m-kanji" preset="kanji" emitevents="true">
        <a-cylinder position="0 0.6 0" radius="0.4" height="1.2" color="#4CAF50">
            <a-animation attribute="rotation" to="0 360 0" dur="3000" repeat="indefinite"></a-animation>
        </a-cylinder>
        <a-text value="Eco Challenge Unlocked!" position="0 2 0" align="center" scale="0.6 0.6 0.6" color="#fff"></a-text>
    </a-marker>

    <!-- Barcode marker 0 -->
    <a-marker id="m-barcode" type="barcode" value="0" emitevents="true">
        <a-sphere position="0 0.6 0" radius="0.45" color="#2196F3">
            <a-animation attribute="scale" to="1.3 1.3 1.3" dur="1000" repeat="indefinite" direction="alternate"></a-animation>
        </a-sphere>
        <a-text value="Renewable Energy Module" position="0 1.8 0" align="center" scale="0.6 0.6 0.6" color="#fff"></a-text>
    </a-marker>
</a-scene>

<!-- HUD (always on top) -->
<div id="hud">
    <div id="info-box">
        <h3>🌿 EcoLearn AR Scanner</h3>
        <p>Point your camera at an AR marker</p>
        <div id="status" class="status st-loading">🔄 Waiting for camera…</div>
    </div>

    <div id="viewfinder">
        <div class="frame">
            <div class="corner tl"></div>
            <div class="corner tr"></div>
            <div class="corner bl"></div>
            <div class="corner br"></div>
            <div class="scan-line"></div>
        </div>
    </div>

    <button id="back-btn" onclick="goBack()">← Back</button>

    <div id="marker-toast">
        <strong id="toast-title">Marker Found!</strong>
        <span id="toast-msg">Hold your camera steady</span>
    </div>
</div>

<!-- Permission / Error overlay -->
<div id="overlay" class="show">
    <div class="ov-icon" id="ov-icon">📷</div>
    <h2 id="ov-title">Camera Access Required</h2>
    <p id="ov-msg">EcoLearn AR Scanner needs your camera to detect eco-markers and show interactive content. Please allow camera access.</p>
    <div class="btn-row">
        <button class="btn btn-green" id="ov-action" onclick="requestCamera()">Allow Camera</button>
        <button class="btn btn-gray"  onclick="goBack()">Cancel</button>
    </div>
</div>

<script>
    const statusEl  = document.getElementById('status');
    const overlay   = document.getElementById('overlay');
    const arScene   = document.getElementById('ar-scene');
    const toast     = document.getElementById('marker-toast');
    let toastTimer  = null;

    function setStatus(msg, cls) {
        statusEl.textContent  = msg;
        statusEl.className    = 'status ' + cls;
    }

    function showToast(title, msg) {
        document.getElementById('toast-title').textContent = title;
        document.getElementById('toast-msg').textContent   = msg;
        toast.classList.add('show');
        clearTimeout(toastTimer);
        toastTimer = setTimeout(() => toast.classList.remove('show'), 4000);
    }

    async function requestCamera() {
        setStatus('🔄 Requesting camera…', 'st-loading');

        if (!navigator.mediaDevices?.getUserMedia) {
            showError('😢', 'Not Supported', 'Your browser does not support camera access. Try Chrome or Edge.');
            return;
        }

        try {
            // Just request permission — let AR.js handle everything after
            const stream = await navigator.mediaDevices.getUserMedia({
                video: { facingMode: { ideal: 'environment' } },
                audio: false
            });
            // Stop our test stream — AR.js will open its own
            stream.getTracks().forEach(t => t.stop());
            launchAR();
        } catch (err) {
            console.error('Camera error:', err);
            if (err.name === 'NotAllowedError' || err.name === 'PermissionDeniedError') {
                showError('🚫', 'Permission Denied',
                    'Camera access was blocked. Click the camera icon in your browser address bar → Allow, then refresh the page.');
            } else if (err.name === 'NotFoundError') {
                showError('🔍', 'No Camera Found', 'No camera device was detected. Please connect a camera and reload.');
            } else {
                showError('⚠️', 'Camera Error', err.message || 'An unknown error occurred. Please try again.');
            }
        }
    }

    function launchAR() {
        overlay.classList.remove('show');
        setStatus('🔄 Starting AR…', 'st-loading');

        // Show the a-scene — AR.js takes over camera + renders to canvas
        arScene.style.display = '';

        // Attach marker event listeners
        ['m-hiro', 'm-kanji', 'm-barcode'].forEach(id => {
            const marker = document.getElementById(id);
            if (!marker) return;

            marker.addEventListener('markerFound', () => {
                setStatus('🎯 Marker detected! Hold steady…', 'st-success');
                const labels = {
                    'm-hiro':    ['Climate Change Module', 'Eco tip: Reduce your carbon footprint!'],
                    'm-kanji':   ['Eco Challenge Unlocked!', 'Complete this challenge for 20 points!'],
                    'm-barcode': ['Renewable Energy Module', 'Learn about solar & wind energy!']
                };
                const [title, msg] = labels[id] || ['Marker Found!', 'Hold your camera steady'];
                showToast(title, msg);
            });

            marker.addEventListener('markerLost', () => {
                setStatus('✅ Ready — point at a marker', 'st-success');
            });
        });

        // Wait for AR.js to signal camera is running
        document.addEventListener('arjs-session-started', () => {
            setStatus('✅ Camera active — point at a marker', 'st-success');
        });

        // Fallback status update via video element AR.js creates
        setTimeout(() => {
            const vid = document.querySelector('video');
            if (vid) {
                vid.addEventListener('loadedmetadata', () => {
                    setStatus('✅ Camera active — point at a marker', 'st-success');
                });
                if (vid.readyState >= 2) {
                    setStatus('✅ Camera active — point at a marker', 'st-success');
                }
            } else {
                // Still loading
                setStatus('🔄 Loading AR engine…', 'st-loading');
            }
        }, 2000);

        // Final safety fallback
        setTimeout(() => {
            if (statusEl.classList.contains('st-loading')) {
                setStatus('✅ Ready — point at a marker', 'st-success');
            }
        }, 6000);
    }

    function showError(icon, title, msg) {
        document.getElementById('ov-icon').textContent  = icon;
        document.getElementById('ov-title').textContent = title;
        document.getElementById('ov-msg').textContent   = msg;
        document.getElementById('ov-action').textContent = 'Try Again';
        document.getElementById('ov-action').onclick    = requestCamera;
        overlay.classList.add('show');
        setStatus('❌ ' + title, 'st-error');
    }

    function goBack() {
        // Stop any camera streams before leaving
        document.querySelectorAll('video').forEach(v => {
            if (v.srcObject) v.srcObject.getTracks().forEach(t => t.stop());
        });
        window.history.length > 1 ? window.history.back() : (window.location.href = '/');
    }

    // Auto-start if permission is already granted
    window.addEventListener('load', () => {
        if (navigator.permissions) {
            navigator.permissions.query({ name: 'camera' }).then(result => {
                if (result.state === 'granted') {
                    // Permission already granted — launch directly
                    launchAR();
                }
                // else: overlay is already showing asking for permission
            }).catch(() => {
                // Permissions API not available — show the overlay button
            });
        }
    });
</script>
</body>
</html>
